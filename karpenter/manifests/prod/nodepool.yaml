apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # m5/r5 for production: non-burstable, memory-optimised options.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m5.large
            - m5.xlarge
            - m5.2xlarge
            - r5.large
            - r5.xlarge

      # Spread nodes across AZs for HA.
      # Combined with WaitForFirstConsumer StorageClass, PVC-bound pods
      # are always co-located with their volume.
      topologySpreadConstraints: []

      expireAfter: Never

  limits:
    cpu: "200"
    memory: 800Gi

  disruption:
    # Conservative: remove only fully empty nodes after a long delay.
    # Karpenter respects PodDisruptionBudgets and the karpenter.sh/do-not-disrupt
    # annotation — stateful pods are never forcibly moved.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 15m
