apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Production instance families: m6a for general-purpose, r6a for
        # memory-optimized. Both are 3rd-gen AMD EPYC (Milan), offering better
        # price/performance than m5/r5 while remaining non-burstable x86.
        # r7 is excluded intentionally: it is premium priced and the prod goal
        # is performance-per-dollar, not absolute latest generation.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m6a.large
            - m6a.xlarge
            - m6a.2xlarge
            - r6a.large
            - r6a.xlarge

      # Spread nodes across AZs for HA.
      # Combined with WaitForFirstConsumer StorageClass, PVC-bound pods
      # are always co-located with their volume.
      topologySpreadConstraints: []

      expireAfter: Never

  limits:
    cpu: "200"
    memory: 800Gi

  disruption:
    # Conservative: remove only fully empty nodes after 12 hours of inactivity.
    # This matches profiles/prod.yaml and keeps production warm through
    # nights/weekends for rapid Monday-morning scale-up. Karpenter still
    # respects PodDisruptionBudgets and the karpenter.sh/do-not-disrupt
    # annotation — stateful pods are never forcibly moved.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 12h
