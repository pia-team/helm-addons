apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        # Architecture
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        # Prefer on-demand for test stability; add "spot" here when you're
        # comfortable with interruption-driven testing.
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Cost-optimized instance families for dev.
        # t3 is the cheapest x86 burstable option in eu-west-1. Karpenter picks
        # the smallest type that fits the pending pod, so t3.medium is the
        # default and t3.large/xlarge are used only when requested resources
        # exceed the smaller sizes.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3.xlarge

      # How long a node may stay empty before Karpenter removes it.
      expireAfter: Never

  # Safety cap — keeps the dev cluster small and cheap.
  limits:
    cpu: "20"
    memory: 80Gi

  disruption:
    # Remove underutilized nodes only after 2 hours of inactivity.
    # This matches profiles/dev.yaml karpenter_consolidate_after.
    # Fast scale-up still happens immediately whenever pods are pending.
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 2h
