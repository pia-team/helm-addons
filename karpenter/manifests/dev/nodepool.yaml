apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        # Architecture
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        # Prefer on-demand for test stability; add "spot" here when you're
        # comfortable with interruption-driven testing.
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Allow a range of cost-efficient instance families.
        # Karpenter picks the cheapest available type that fits the pending pod.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            # t-series (burstable, cost-efficient — default)
            - t3.medium
            - t3.large
            - t3.xlarge
            # m-series (general purpose — uncomment for production workloads)
            # - m5.large
            # - m5.xlarge
            # - m5.2xlarge
            # r-series (memory optimised — uncomment for memory-intensive workloads)
            # - r5.large
            # - r5.xlarge
            # - r5.2xlarge

      # How long a node may stay empty before Karpenter removes it.
      expireAfter: Never

  # Safety cap — keeps the dev cluster small and cheap.
  limits:
    cpu: "20"
    memory: 80Gi

  disruption:
    # Remove underutilized nodes after 5 minutes (delayed shrink to prevent
    # flapping when VPA is adjusting requests up and down).
    # Fast scale-up still happens immediately whenever pods are pending.
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
