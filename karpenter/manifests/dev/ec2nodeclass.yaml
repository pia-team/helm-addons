apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AL2023 is the recommended AMI family for new clusters (EKS 1.29+).
  # Karpenter v1.x uses amiSelectorTerms instead of amiFamily.
  # Use @latest to always get the newest patched AMI, or pin to a specific version
  # e.g. al2023@v20240625 for reproducible builds.
  amiSelectorTerms:
    - alias: al2023@latest

  # The IAM role that Karpenter-provisioned nodes will assume.
  # Must match karpenter_node_role_name from karpenter/iam/ Terraform output.
  role: eks-karpenter-vpa-karpenter-node

  # Use the dedicated /20 prefix-delegation pod subnets (10.1.16.0/20, 10.1.32.0/20),
  # tagged eks-karpenter-vpa-pods in clusters/eks-karpenter-vpa/main.tf. These are
  # large enough to hand out /28 prefixes; the default /24s (tag eks-karpenter-vpa)
  # are too small/fragmented for prefix delegation.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-karpenter-vpa-pods

  # Security group is discovered via the cluster-owned tag set by EKS itself.
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/eks-karpenter-vpa: owned

  # Tag every instance Karpenter launches so the controller policy conditions work.
  # Note: kubernetes.io/cluster/* tags are reserved and managed by Karpenter — do not set them here.
  tags:
    karpenter.sh/discovery: eks-karpenter-vpa

  # Pod density: VPC CNI prefix delegation is enabled on aws-node
  # (ENABLE_PREFIX_DELEGATION=true) and these nodes run in the dedicated /20 pod
  # subnets, so a t3.medium can run up to the kubelet cap of 110 pods (vs 17).
  kubelet:
    maxPods: 110
