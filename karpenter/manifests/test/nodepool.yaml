apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Broader mix than dev: t3 for cost, m6a for non-burstable stability.
        # m6a (AMD EPYC Milan) replaces m5: better price/performance in
        # eu-west-1 while still being non-burstable x86.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.large
            - t3.xlarge
            - m6a.large
            - m6a.xlarge

      expireAfter: Never

  limits:
    cpu: "50"
    memory: 200Gi

  disruption:
    # WhenEmpty: only consolidate fully empty nodes, and wait 4 hours of
    # inactivity before doing so. This matches profiles/test.yaml.
    # Running pods are never moved, giving test workloads a stable environment.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 4h
