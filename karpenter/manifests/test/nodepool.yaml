apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        provisioner: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Broader mix than dev: include m5 for non-burstable workloads.
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.large
            - t3.xlarge
            - m5.large
            - m5.xlarge

      expireAfter: Never

  limits:
    cpu: "50"
    memory: 200Gi

  disruption:
    # WhenEmpty: only consolidate fully empty nodes.
    # Running pods are never moved, giving test workloads a stable environment.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10m
