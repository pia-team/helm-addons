# prod profile — high availability first, gentle in-place VPA resize.
#
# Goals:
#   - InPlaceOrRecreate VPA with very conservative updater settings
#   - On-demand m/r-series for predictable, non-burstable performance
#   - Karpenter scales down conservatively; never disrupts PVC-bound or PDB-protected pods
#   - Multi-AZ spread baked into NodePool topology requirements

profile: prod

# --- Karpenter ---
karpenter_manifest_dir: karpenter/manifests/prod

# Conservative consolidation: remove empty nodes only after 12 hours of
# inactivity. This keeps production warm through nights and weekends and
# avoids Monday-morning cold-start latency. Scale-up is still immediate when
# pending pods exist.
karpenter_consolidation_policy: WhenEmpty
karpenter_consolidate_after: 12h

# Instance families: m6a for general-purpose compute, r6a for memory-heavy
# workloads. Both are 3rd-gen AMD EPYC (Milan) and offer better
# price/performance than the older m5/r5 families in eu-west-1.
# We do NOT use r7 because the goal is "performance optimized in a cost
# optimized manner"; r7 is premium priced. m6a/r6a are the x86 perf/$
# sweet spot for production.
karpenter_instance_types:
  - m6a.large
  - m6a.xlarge
  - m6a.2xlarge
  - r6a.large
  - r6a.xlarge

karpenter_cpu_limit: "200"
karpenter_memory_limit: 800Gi

# --- VPA ---
# InPlaceOrRecreate in prod: recommendations are applied in-place with very
# conservative updater settings. Eviction is almost never triggered because
# eviction-tolerance is high and pods must be at least 24 hours old before the
# updater considers them. This gives engineers confidence that sizing changes
# happen gently.
vpa_update_mode: InPlaceOrRecreate
vpa_min_replicas: "2"

# Conservative updater: high eviction tolerance (resize only when there is
# substantial headroom) and a 24-hour minimum pod lifetime before acting.
vpa_eviction_tolerance: "0.75"
vpa_pod_lifetime_update_threshold: 24h

goldilocks_vpa_update_mode: InPlaceOrRecreate
