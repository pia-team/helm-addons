# test profile — stability over cost.
#
# Goals:
#   - No surprise pod evictions (VPA in InPlaceOrRecreate with moderate updater)
#   - On-demand capacity, no spot interruptions
#   - Karpenter scales down only when nodes are completely empty
#   - Broader instance families for better scheduling headroom

profile: test

# --- Karpenter ---
karpenter_manifest_dir: karpenter/manifests/test

# Consolidation: only remove fully empty nodes, and wait 4 hours of
# inactivity before doing so. This gives test workloads a stable environment
# during the working day while still cleaning up overnight.
karpenter_consolidation_policy: WhenEmpty
karpenter_consolidate_after: 4h

# Instance families: t3 for cost, m6a for non-burstable general-purpose
# workloads. m6a (AMD EPYC Milan) is cheaper and faster than m5 in
# eu-west-1, so it is the cost-optimized stability choice.
karpenter_instance_types:
  - t3.large
  - t3.xlarge
  - m6a.large
  - m6a.xlarge

karpenter_cpu_limit: "50"
karpenter_memory_limit: 200Gi

# --- VPA ---
# InPlaceOrRecreate: resize the running container live, but with moderate
# updater settings so running test pods are not churned aggressively.
vpa_update_mode: InPlaceOrRecreate
vpa_min_replicas: "2"

# Moderate updater: half the default eviction tolerance and a 6-hour minimum
# pod lifetime before the updater will consider resizing a running pod.
vpa_eviction_tolerance: "0.5"
vpa_pod_lifetime_update_threshold: 6h

goldilocks_vpa_update_mode: InPlaceOrRecreate
