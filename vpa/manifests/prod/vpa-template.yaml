# Fallback / hand-managed VPA template for the prod profile.
#
# updateMode: InPlaceOrRecreate — the prod profile enables in-place resize, but
# the updater is configured conservatively (high eviction tolerance, 24h minimum
# pod lifetime). This CR just ensures the correct mode is set when Goldilocks
# does not propagate it.
# minReplicas: 2 prevents the updater from acting on single-replica prod workloads.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: <deployment-name>
  namespace: <namespace>
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: <deployment-name>
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources:
          - cpu
          - memory
        minAllowed:
          cpu: 50m
          memory: 128Mi
