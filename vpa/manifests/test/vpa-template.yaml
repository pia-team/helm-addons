# Fallback / hand-managed VPA template for the test profile.
#
# updateMode: InPlaceOrRecreate — resize the running container live; evict only
# as fallback. Matches the test profile default.
# minReplicas: 2 keeps the updater from acting on single-replica test workloads.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: <deployment-name>
  namespace: <namespace>
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: <deployment-name>
  updatePolicy:
    updateMode: InPlaceOrRecreate
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources:
          - cpu
          - memory
        minAllowed:
          cpu: 25m
          memory: 64Mi
